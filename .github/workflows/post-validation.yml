# 검증 후처리 워크플로우
# validate-skill.yml 완료 후 실행되어 write 권한이 필요한 작업 수행
# workflow_run은 항상 원본 저장소 컨텍스트에서 실행되므로 write 권한 유지

name: 검증 후처리

on:
  workflow_run:
    workflows: ["Skill 검증"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  post-validation:
    name: 라벨·코멘트·리뷰어 처리
    runs-on: ubuntu-latest
    # PR 이벤트에서 트리거된 workflow_run만 처리
    if: ${{ github.event.workflow_run.event == 'pull_request' }}

    steps:
      # ──────────────────────────────────────────
      # 1단계: 검증 결과 artifact 다운로드
      # ──────────────────────────────────────────
      - name: 검증 결과 다운로드
        uses: actions/download-artifact@v4
        with:
          name: validation-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # ──────────────────────────────────────────
      # 2단계: 결과 파싱 및 변수 설정
      # ──────────────────────────────────────────
      - name: 결과 파싱
        id: parse
        run: |
          cat results.json

          PR_NUMBER=$(jq -r '.pr_number' results.json)
          LABELS=$(jq -r '.labels' results.json)
          COMMON_CHANGED=$(jq -r '.common_changed' results.json)

          PR_BODY=$(jq -r '.pr_body_check' results.json)
          FORK=$(jq -r '.fork_check' results.json)
          OWNERSHIP=$(jq -r '.ownership_check' results.json)
          STRUCTURE=$(jq -r '.structure_check' results.json)
          COMMON=$(jq -r '.common_area_check' results.json)
          GITLEAKS=$(jq -r '.gitleaks_check' results.json)
          FORBIDDEN=$(jq -r '.forbidden_files_check' results.json)

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          echo "common_changed=$COMMON_CHANGED" >> "$GITHUB_OUTPUT"

          echo "pr_body=$PR_BODY" >> "$GITHUB_OUTPUT"
          echo "fork=$FORK" >> "$GITHUB_OUTPUT"
          echo "ownership=$OWNERSHIP" >> "$GITHUB_OUTPUT"
          echo "structure=$STRUCTURE" >> "$GITHUB_OUTPUT"
          echo "common=$COMMON" >> "$GITHUB_OUTPUT"
          echo "gitleaks=$GITLEAKS" >> "$GITHUB_OUTPUT"
          echo "forbidden=$FORBIDDEN" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────
      # 3단계: PR 자동 라벨링
      # ──────────────────────────────────────────
      - name: PR 자동 라벨링
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS="${{ steps.parse.outputs.labels }}"
          PR_NUMBER="${{ steps.parse.outputs.pr_number }}"

          if [ -n "$LABELS" ]; then
            echo "부여할 라벨: $LABELS"
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --add-label "$LABELS" \
              && echo "라벨 부여 완료" \
              || echo "::warning::라벨 부여 실패"
          else
            echo "자동 부여할 라벨 없음"
          fi

      # ──────────────────────────────────────────
      # 4단계: 공통 영역 변경 시 관리자 리뷰어 지정
      # ──────────────────────────────────────────
      - name: 관리자 리뷰어 지정
        if: ${{ steps.parse.outputs.common_changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.parse.outputs.pr_number }}"

          # PR 작성자 조회
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json author --jq '.author.login')
          echo "PR 작성자: $PR_AUTHOR"

          # admins 팀 멤버 중 PR 작성자를 제외한 리뷰어 목록 생성
          REVIEWERS=$(gh api \
            "orgs/${{ github.repository_owner }}/teams/admins/members" \
            --jq '.[].login' \
            | grep -v "^${PR_AUTHOR}$" || true)

          if [ -z "$REVIEWERS" ]; then
            echo "::notice::PR 작성자($PR_AUTHOR)가 admins 팀의 유일한 멤버입니다. 리뷰어 자동 지정을 건너뜁니다."
            exit 0
          fi

          # 팀 리뷰어 지정 시도
          echo "관리자 팀을 리뷰어로 지정 중..."
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f "team_reviewers[]=admins" \
            && echo "리뷰어 지정 완료: @L3G4CY-TEAM/admins" \
            || {
              # 팀 지정 실패 시 개별 멤버로 폴백
              echo "::warning::팀 리뷰어 지정 실패. 개별 멤버로 지정 시도 중..."
              for REVIEWER in $REVIEWERS; do
                gh pr edit "$PR_NUMBER" \
                  --repo "${{ github.repository }}" \
                  --add-reviewer "$REVIEWER" \
                  && echo "리뷰어 지정 완료: @$REVIEWER" \
                  || echo "::warning::리뷰어 지정 실패: @$REVIEWER"
              done
            }

      # ──────────────────────────────────────────
      # 5단계: 검증 결과 PR 코멘트 작성
      # ──────────────────────────────────────────
      - name: 검증 결과 PR 코멘트 작성
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.parse.outputs.pr_number }}"

          PR_BODY_RESULT="${{ steps.parse.outputs.pr_body }}"
          FORK_RESULT="${{ steps.parse.outputs.fork }}"
          OWNERSHIP_RESULT="${{ steps.parse.outputs.ownership }}"
          STRUCTURE_RESULT="${{ steps.parse.outputs.structure }}"
          COMMON_RESULT="${{ steps.parse.outputs.common }}"
          GITLEAKS_RESULT="${{ steps.parse.outputs.gitleaks }}"
          FORBIDDEN_RESULT="${{ steps.parse.outputs.forbidden }}"

          # 결과 이모지 변환
          get_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⏳" ;;
            esac
          }

          PR_BODY_ICON=$(get_icon "$PR_BODY_RESULT")
          FORK_ICON=$(get_icon "$FORK_RESULT")
          OWNERSHIP_ICON=$(get_icon "$OWNERSHIP_RESULT")
          STRUCTURE_ICON=$(get_icon "$STRUCTURE_RESULT")
          COMMON_ICON=$(get_icon "$COMMON_RESULT")
          GITLEAKS_ICON=$(get_icon "$GITLEAKS_RESULT")
          FORBIDDEN_ICON=$(get_icon "$FORBIDDEN_RESULT")

          # 전체 결과 판정
          # COMMON_RESULT만 != "failure" (skipped 허용): 공통 영역 미변경 시 skipped이므로 통과 처리
          # 나머지는 반드시 success여야 함 (skipped 불허)
          if [ "$PR_BODY_RESULT" = "success" ] && \
             [ "$FORK_RESULT" = "success" ] && \
             [ "$OWNERSHIP_RESULT" = "success" ] && \
             [ "$STRUCTURE_RESULT" = "success" ] && \
             [ "$COMMON_RESULT" != "failure" ] && \
             [ "$GITLEAKS_RESULT" = "success" ] && \
             [ "$FORBIDDEN_RESULT" = "success" ]; then
            OVERALL="✅ **모든 검증 통과** - 머지 가능합니다!"
          else
            OVERALL="❌ **검증 실패** - 위의 오류를 수정한 후 PR을 업데이트해 주세요."
          fi

          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "## 🔍 Skill 자동 검증 결과

          | 검증 항목 | 결과 |
          |-----------|------|
          | $PR_BODY_ICON 변경 유형 체크 | \`$PR_BODY_RESULT\` |
          | $FORK_ICON Fork PR 확인 | \`$FORK_RESULT\` |
          | $OWNERSHIP_ICON 디렉토리 소유권 | \`$OWNERSHIP_RESULT\` |
          | $STRUCTURE_ICON SKILL.md 구조 | \`$STRUCTURE_RESULT\` |
          | $COMMON_ICON 공통 영역 보호 | \`$COMMON_RESULT\` |
          | $GITLEAKS_ICON 시크릿 스캔 (gitleaks) | \`$GITLEAKS_RESULT\` |
          | $FORBIDDEN_ICON 금지 파일 검사 | \`$FORBIDDEN_RESULT\` |

          ---

          $OVERALL

          > 검증 상세 로그는 [Actions 탭]($WORKFLOW_URL)에서 확인하세요.
          > 문의사항은 @L3G4CY-TEAM/admins 에게 태그해 주세요." \
          && echo "PR 코멘트 작성 완료" \
          || echo "::warning::PR 코멘트 작성 실패"
