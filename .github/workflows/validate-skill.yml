# PR 자동 검증 워크플로우
# 보안 원칙: pull_request 트리거만 사용 (pull_request_target 절대 금지)
# 이유: pull_request_target은 Fork PR에서 저장소 Secrets가 노출될 위험이 있음
# PR에서 제출된 스크립트(scripts/)는 CI에서 절대 실행하지 않음

name: Skill 검증

on:
  pull_request:
    types: [opened, synchronize]

# 최소 권한 원칙 적용
permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Skill 유효성 검사
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────
      # 1단계: 코드 체크아웃
      # ──────────────────────────────────────────
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # PR 헤드를 체크아웃 (merge commit 아님)
          ref: ${{ github.event.pull_request.head.sha }}
          # fetch-depth 0: diff 계산을 위해 전체 히스토리 필요
          fetch-depth: 0

      # ──────────────────────────────────────────
      # 2단계: Fork PR 검증
      # 직접 브랜치 PR은 셀프 머지 방지를 위해 차단
      # ──────────────────────────────────────────
      - name: Fork PR 여부 확인
        id: fork-check
        run: |
          PR_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.repository }}"

          echo "PR 헤드 저장소: $PR_REPO"
          echo "베이스 저장소:  $BASE_REPO"

          if [ "$PR_REPO" = "$BASE_REPO" ]; then
            echo "::error::직접 브랜치 PR은 허용되지 않습니다."
            echo "::error::원본 저장소를 Fork한 후, Fork 저장소에서 PR을 생성해 주세요."
            echo "::error::참고: CONTRIBUTING.md > Git 워크플로우 섹션"
            exit 1
          fi

          echo "Fork PR 확인 완료: $PR_REPO → $BASE_REPO"

      # ──────────────────────────────────────────
      # 3단계: 변경 파일 목록 수집
      # ──────────────────────────────────────────
      - name: 변경 파일 목록 수집
        id: changed-files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh pr diff로 변경 파일 목록 가져오기
          CHANGED=$(gh pr diff ${{ github.event.number }} --name-only 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "변경된 파일이 없습니다."
            echo "changed_files=" >> "$GITHUB_OUTPUT"
          else
            echo "변경된 파일 목록:"
            echo "$CHANGED"
            # 개행을 공백으로 변환하여 출력 변수에 저장
            CHANGED_ONELINE=$(echo "$CHANGED" | tr '\n' ' ')
            echo "changed_files=$CHANGED_ONELINE" >> "$GITHUB_OUTPUT"
          fi

          # skills/ 하위 변경 파일만 필터링
          SKILL_FILES=$(echo "$CHANGED" | grep '^skills/' || true)
          echo "skills/ 변경 파일:"
          echo "$SKILL_FILES"

          # skills/ 하위 고유 username 디렉토리 추출 (skills/{username}/...)
          SKILL_USERS=$(echo "$SKILL_FILES" \
            | grep -oP '^skills/[^/]+' \
            | sort -u \
            | sed 's|^skills/||' \
            || true)
          echo "변경된 username 디렉토리: $SKILL_USERS"

          # 개행을 공백으로 변환
          SKILL_USERS_ONELINE=$(echo "$SKILL_USERS" | tr '\n' ' ' | xargs)
          echo "skill_users=$SKILL_USERS_ONELINE" >> "$GITHUB_OUTPUT"

          # skills/ 하위 고유 skill 폴더 추출 (skills/{username}/{skill-name})
          SKILL_DIRS=$(echo "$SKILL_FILES" \
            | grep -oP '^skills/[^/]+/[^/]+' \
            | sort -u \
            || true)
          SKILL_DIRS_ONELINE=$(echo "$SKILL_DIRS" | tr '\n' ' ' | xargs)
          echo "skill_dirs=$SKILL_DIRS_ONELINE" >> "$GITHUB_OUTPUT"

          # 공통 영역 변경 여부 감지
          COMMON_CHANGED=$(echo "$CHANGED" | grep -E '^(\.github/|templates/|README\.md|CONTRIBUTING\.md|CODEOWNERS|\.gitignore|\.gitattributes)' || true)
          if [ -n "$COMMON_CHANGED" ]; then
            echo "common_changed=true" >> "$GITHUB_OUTPUT"
            echo "공통 영역 변경 감지:"
            echo "$COMMON_CHANGED"
          else
            echo "common_changed=false" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────
      # 4단계: 디렉토리 소유권 검증
      # PR 작성자 username과 skills/{username}/ 경로 일치 확인
      # ──────────────────────────────────────────
      - name: 디렉토리 소유권 검증
        id: ownership-check
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          SKILL_USERS="${{ steps.changed-files.outputs.skill_users }}"

          echo "PR 작성자: $PR_AUTHOR"
          echo "변경된 username 디렉토리: $SKILL_USERS"

          # skills/ 하위에 변경 파일이 없으면 소유권 검증 불필요
          if [ -z "$SKILL_USERS" ]; then
            echo "skills/ 하위 변경 없음 - 소유권 검증 건너뜀"
            exit 0
          fi

          FAIL=0
          for USER_DIR in $SKILL_USERS; do
            if [ "$USER_DIR" != "$PR_AUTHOR" ]; then
              echo "::error::디렉토리 소유권 위반: skills/$USER_DIR/ 는 $USER_DIR 의 디렉토리입니다."
              echo "::error::PR 작성자($PR_AUTHOR)는 자신의 디렉토리(skills/$PR_AUTHOR/)만 수정할 수 있습니다."
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo "::error::다른 사람의 디렉토리를 수정하는 PR은 머지가 차단됩니다."
            exit 1
          fi

          echo "디렉토리 소유권 검증 통과"

      # ──────────────────────────────────────────
      # 5단계: SKILL.md 구조 검증
      # ──────────────────────────────────────────
      - name: SKILL.md 구조 검증
        id: skill-structure-check
        run: |
          SKILL_DIRS="${{ steps.changed-files.outputs.skill_dirs }}"

          # skills/ 하위 변경이 없으면 건너뜀
          if [ -z "$SKILL_DIRS" ]; then
            echo "skills/ 하위 변경 없음 - 구조 검증 건너뜀"
            exit 0
          fi

          FAIL=0
          WARNINGS=""

          for SKILL_DIR in $SKILL_DIRS; do
            echo ""
            echo "=== 검증 중: $SKILL_DIR ==="

            # skill 폴더명 추출 (마지막 경로 세그먼트)
            SKILL_NAME=$(basename "$SKILL_DIR")
            USERNAME=$(echo "$SKILL_DIR" | cut -d'/' -f2)

            # ── kebab-case 검증 ──
            if ! echo "$SKILL_NAME" | grep -qP '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "::error::[$SKILL_DIR] Skill 폴더명 규칙 위반: '$SKILL_NAME'"
              echo "::error::폴더명은 kebab-case (소문자, 숫자, 하이픈만) 이어야 합니다. 예: xss-hunter, subdomain-recon"
              FAIL=1
            else
              echo "[OK] 폴더명 kebab-case: $SKILL_NAME"
            fi

            # ── SKILL.md 존재 여부 ──
            SKILL_MD="$SKILL_DIR/SKILL.md"
            if [ ! -f "$SKILL_MD" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md 파일이 없습니다."
              echo "::error::각 Skill 폴더에는 SKILL.md 파일이 반드시 있어야 합니다."
              echo "::error::templates/skill-template/SKILL.md 를 참고하여 작성해 주세요."
              FAIL=1
              continue  # SKILL.md 없으면 이후 검증 불가
            fi
            echo "[OK] SKILL.md 존재 확인"

            # ── SKILL.md 라인 수 ≤ 500줄 ──
            LINE_COUNT=$(wc -l < "$SKILL_MD")
            if [ "$LINE_COUNT" -gt 500 ]; then
              echo "::error::[$SKILL_DIR] SKILL.md 라인 수 초과: ${LINE_COUNT}줄 (최대 500줄)"
              echo "::error::에이전트 성능 저하 방지를 위해 500줄 이하로 유지해야 합니다."
              echo "::error::초과 내용은 references/ 디렉토리로 분리해 주세요."
              FAIL=1
            else
              echo "[OK] SKILL.md 라인 수: ${LINE_COUNT}줄"
            fi

            # ── YAML frontmatter 존재 여부 ──
            FIRST_LINE=$(head -1 "$SKILL_MD")
            if [ "$FIRST_LINE" != "---" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md에 YAML frontmatter가 없습니다."
              echo "::error::파일의 첫 줄은 '---' 로 시작하는 YAML frontmatter여야 합니다."
              FAIL=1
              continue
            fi

            # frontmatter 끝 위치 찾기 (두 번째 ---)
            FRONTMATTER_END=$(awk 'NR>1 && /^---/{print NR; exit}' "$SKILL_MD")
            if [ -z "$FRONTMATTER_END" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md의 YAML frontmatter가 닫히지 않았습니다."
              echo "::error::'---' 로 시작하고 '---' 로 닫는 YAML frontmatter가 필요합니다."
              FAIL=1
              continue
            fi

            # frontmatter 내용 추출 (첫 번째 --- 와 두 번째 --- 사이)
            FRONTMATTER=$(sed -n "2,$((FRONTMATTER_END - 1))p" "$SKILL_MD")

            # 빈 frontmatter 체크 (--- 만 두 줄 있고 내용이 없는 경우)
            if [ -z "$(echo "$FRONTMATTER" | tr -d '[:space:]')" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md의 YAML frontmatter가 비어있습니다."
              echo "::error::name, description 등 필수 필드를 작성해 주세요."
              FAIL=1
              continue
            fi
            echo "파싱된 frontmatter:"
            echo "$FRONTMATTER" | head -20

            # ── name 필드 존재 확인 ──
            NAME_VALUE=$(echo "$FRONTMATTER" | grep -P '^name:\s*' | head -1 | sed 's/^name:\s*//' | xargs)
            if [ -z "$NAME_VALUE" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md frontmatter에 'name' 필드가 없습니다."
              FAIL=1
            else
              echo "[OK] name 필드: $NAME_VALUE"

              # ── name 규칙 검증 ──

              # 1) 최대 64자
              NAME_LEN=${#NAME_VALUE}
              if [ "$NAME_LEN" -gt 64 ]; then
                echo "::error::[$SKILL_DIR] name 길이 초과: ${NAME_LEN}자 (최대 64자)"
                FAIL=1
              fi

              # 2) 소문자+숫자+하이픈만
              if ! echo "$NAME_VALUE" | grep -qP '^[a-z0-9-]+$'; then
                echo "::error::[$SKILL_DIR] name 형식 오류: '$NAME_VALUE'"
                echo "::error::name은 소문자(a-z), 숫자(0-9), 하이픈(-)만 사용할 수 있습니다."
                FAIL=1
              fi

              # 3) 하이픈으로 시작/끝 금지
              if echo "$NAME_VALUE" | grep -qP '^-|-$'; then
                echo "::error::[$SKILL_DIR] name 형식 오류: '$NAME_VALUE'"
                echo "::error::name은 하이픈(-)으로 시작하거나 끝날 수 없습니다."
                FAIL=1
              fi

              # 4) 연속 하이픈 금지
              if echo "$NAME_VALUE" | grep -qP '--'; then
                echo "::error::[$SKILL_DIR] name 형식 오류: '$NAME_VALUE'"
                echo "::error::name에 연속 하이픈(--)은 사용할 수 없습니다."
                FAIL=1
              fi

              # 5) 폴더명과 동일
              if [ "$NAME_VALUE" != "$SKILL_NAME" ]; then
                echo "::error::[$SKILL_DIR] name 불일치: frontmatter의 name('$NAME_VALUE')이 폴더명('$SKILL_NAME')과 같아야 합니다."
                echo "::error::name 값은 Skill 폴더명과 정확히 일치해야 합니다."
                FAIL=1
              else
                echo "[OK] name이 폴더명과 일치"
              fi
            fi

            # ── description 필드 존재 및 규칙 확인 ──
            # description은 한 줄 또는 여러 줄일 수 있으므로 단순 grep으로 체크
            DESC_VALUE=$(echo "$FRONTMATTER" | grep -P '^description:\s*' | head -1 | sed 's/^description:\s*//' | xargs)
            if [ -z "$DESC_VALUE" ]; then
              echo "::error::[$SKILL_DIR] SKILL.md frontmatter에 'description' 필드가 없거나 비어있습니다."
              echo "::error::description은 에이전트가 이 Skill을 언제 사용할지 판단하는 핵심 필드입니다."
              FAIL=1
            else
              DESC_LEN=${#DESC_VALUE}
              if [ "$DESC_LEN" -gt 1024 ]; then
                echo "::error::[$SKILL_DIR] description 길이 초과: ${DESC_LEN}자 (최대 1,024자)"
                FAIL=1
              else
                echo "[OK] description 필드: ${DESC_LEN}자"
              fi
            fi

            # ── 비표준 폴더 경고 ──
            STANDARD_DIRS="scripts references assets"
            if [ -d "$SKILL_DIR" ]; then
              for SUBDIR in "$SKILL_DIR"/*/; do
                [ -d "$SUBDIR" ] || continue
                SUBDIR_NAME=$(basename "$SUBDIR")
                IS_STANDARD=0
                for STD in $STANDARD_DIRS; do
                  if [ "$SUBDIR_NAME" = "$STD" ]; then
                    IS_STANDARD=1
                    break
                  fi
                done
                if [ "$IS_STANDARD" = "0" ]; then
                  WARNINGS="$WARNINGS\n::warning::[$SKILL_DIR] 비표준 폴더 감지: '$SUBDIR_NAME/'"
                  WARNINGS="$WARNINGS\n::warning::권장 폴더는 scripts/, references/, assets/ 입니다. 비표준 폴더는 에이전트가 무시할 수 있습니다."
                fi
              done
            fi

            # ── assets/ 파일 크기 ≤ 5MB ──
            ASSETS_DIR="$SKILL_DIR/assets"
            if [ -d "$ASSETS_DIR" ]; then
              while IFS= read -r -d '' ASSET_FILE; do
                FILE_SIZE=$(stat -c%s "$ASSET_FILE" 2>/dev/null || echo 0)
                FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE / 1048576" | bc)
                if [ "$FILE_SIZE" -gt 5242880 ]; then
                  echo "::error::[$SKILL_DIR] assets/ 파일 크기 초과: $(basename "$ASSET_FILE") (${FILE_SIZE_MB}MB, 최대 5MB)"
                  echo "::error::대용량 파일은 Git LFS를 사용하거나 외부 링크로 대체해 주세요."
                  FAIL=1
                else
                  echo "[OK] assets/$(basename "$ASSET_FILE"): ${FILE_SIZE_MB}MB"
                fi
              done < <(find "$ASSETS_DIR" -type f -print0)
            fi

          done

          # 경고 출력
          if [ -n "$WARNINGS" ]; then
            echo ""
            echo "=== 경고 사항 ==="
            echo -e "$WARNINGS"
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "::error::Skill 구조 검증 실패. 위의 오류를 수정한 후 다시 PR을 업데이트해 주세요."
            exit 1
          fi

          echo ""
          echo "Skill 구조 검증 통과"

      # ──────────────────────────────────────────
      # 6단계: 공통 영역 보호
      # .github/, templates/, README.md, CONTRIBUTING.md, CODEOWNERS 수정 감지
      # ──────────────────────────────────────────
      - name: 공통 영역 보호 확인
        id: common-area-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMON_CHANGED="${{ steps.changed-files.outputs.common_changed }}"

          if [ "$COMMON_CHANGED" != "true" ]; then
            echo "공통 영역 변경 없음 - 건너뜀"
            exit 0
          fi

          echo "::warning::공통 영역 파일이 수정되었습니다."
          echo "::warning::관리자 팀(@L3G4CY-TEAM/admins)의 리뷰 승인이 필요합니다."

          # 관리자 팀을 PR 리뷰어로 자동 지정
          echo "관리자 팀을 리뷰어로 지정 중..."
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.number }}/requested_reviewers" \
            -f "team_reviewers[]=admins" \
            2>/dev/null \
            && echo "리뷰어 지정 완료: @L3G4CY-TEAM/admins" \
            || echo "::warning::리뷰어 자동 지정 실패 (팀 권한 확인 필요). 수동으로 @L3G4CY-TEAM/admins 를 리뷰어로 지정해 주세요."

          # 공통 영역 수정 PR은 관리자 리뷰 전까지 체크 실패 처리
          echo "::error::공통 영역 보호: .github/, templates/, README.md, CONTRIBUTING.md, CODEOWNERS, .gitignore, .gitattributes 는 관리자 팀의 리뷰가 필요합니다."
          echo "::error::@L3G4CY-TEAM/admins 의 승인 후 머지가 가능합니다."
          exit 1

      # ──────────────────────────────────────────
      # 7단계: 보안 검증 - gitleaks 시크릿 스캔
      # ──────────────────────────────────────────
      - name: gitleaks 시크릿 스캔
        id: gitleaks-check
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # 상업용 라이선스 보유 시 주석 해제
          # gitleaks-action@v2는 pull_request 이벤트에서 자동으로 PR diff 스캔 수행
          # 시크릿 감지 시 자동으로 exit code 1 반환 및 PR 코멘트 작성

      # ──────────────────────────────────────────
      # 8단계: 금지 파일 차단
      # .env, credentials.json 등 민감 파일 업로드 금지
      # ──────────────────────────────────────────
      - name: 금지 파일 차단
        id: forbidden-files-check
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"

          # 금지 파일 패턴 목록
          FORBIDDEN_PATTERNS=(
            "\.env$"
            "\.env\."
            "credentials\.json$"
            "secrets\.json$"
            "secret\.json$"
            "\.pem$"
            "\.key$"
            "\.p12$"
            "\.pfx$"
            "id_rsa$"
            "id_dsa$"
            "id_ecdsa$"
            "id_ed25519$"
            "\.ppk$"
            "aws_credentials$"
            "\.netrc$"
            "htpasswd$"
            "shadow$"
          )

          FAIL=0
          for FILE in $CHANGED_FILES; do
            for PATTERN in "${FORBIDDEN_PATTERNS[@]}"; do
              if echo "$FILE" | grep -qP "$PATTERN"; then
                echo "::error::금지 파일 감지: $FILE"
                echo "::error::민감 정보가 포함될 수 있는 파일은 저장소에 업로드할 수 없습니다."
                echo "::error::.gitignore에 해당 파일 패턴을 추가하고, 저장소 히스토리에서 제거해 주세요."
                FAIL=1
                break
              fi
            done
          done

          if [ "$FAIL" = "1" ]; then
            echo "::error::보안 정책 위반: 금지 파일이 포함된 PR은 머지할 수 없습니다."
            exit 1
          fi

          echo "금지 파일 검사 통과"

      # ──────────────────────────────────────────
      # 9단계: 검증 결과 PR 코멘트 작성
      # ──────────────────────────────────────────
      - name: 검증 결과 PR 코멘트 작성
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 각 단계 결과 수집
          FORK_RESULT="${{ steps.fork-check.outcome }}"
          OWNERSHIP_RESULT="${{ steps.ownership-check.outcome }}"
          STRUCTURE_RESULT="${{ steps.skill-structure-check.outcome }}"
          COMMON_RESULT="${{ steps.common-area-check.outcome }}"
          GITLEAKS_RESULT="${{ steps.gitleaks-check.outcome }}"
          FORBIDDEN_RESULT="${{ steps.forbidden-files-check.outcome }}"

          # 결과 이모지 변환 함수 (bash에서는 함수 사용)
          get_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⏳" ;;
            esac
          }

          FORK_ICON=$(get_icon "$FORK_RESULT")
          OWNERSHIP_ICON=$(get_icon "$OWNERSHIP_RESULT")
          STRUCTURE_ICON=$(get_icon "$STRUCTURE_RESULT")
          COMMON_ICON=$(get_icon "$COMMON_RESULT")
          GITLEAKS_ICON=$(get_icon "$GITLEAKS_RESULT")
          FORBIDDEN_ICON=$(get_icon "$FORBIDDEN_RESULT")

          # 전체 결과 판정
          # COMMON_RESULT만 != "failure" (skipped 허용): 공통 영역 미변경 시 skipped이므로 통과 처리
          # 나머지는 반드시 success여야 함 (skipped 불허)
          if [ "$FORK_RESULT" = "success" ] && \
             [ "$OWNERSHIP_RESULT" = "success" ] && \
             [ "$STRUCTURE_RESULT" = "success" ] && \
             [ "$COMMON_RESULT" != "failure" ] && \
             [ "$GITLEAKS_RESULT" = "success" ] && \
             [ "$FORBIDDEN_RESULT" = "success" ]; then
            OVERALL="✅ **모든 검증 통과** - 머지 가능합니다!"
          else
            OVERALL="❌ **검증 실패** - 위의 오류를 수정한 후 PR을 업데이트해 주세요."
          fi

          # PR 코멘트 작성
          gh pr comment ${{ github.event.number }} --body "## 🔍 Skill 자동 검증 결과

          | 검증 항목 | 결과 |
          |-----------|------|
          | $FORK_ICON Fork PR 확인 | \`$FORK_RESULT\` |
          | $OWNERSHIP_ICON 디렉토리 소유권 | \`$OWNERSHIP_RESULT\` |
          | $STRUCTURE_ICON SKILL.md 구조 | \`$STRUCTURE_RESULT\` |
          | $COMMON_ICON 공통 영역 보호 | \`$COMMON_RESULT\` |
          | $GITLEAKS_ICON 시크릿 스캔 (gitleaks) | \`$GITLEAKS_RESULT\` |
          | $FORBIDDEN_ICON 금지 파일 검사 | \`$FORBIDDEN_RESULT\` |

          ---

          $OVERALL

          > 검증 상세 로그는 [Actions 탭](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})에서 확인하세요.
          > 문의사항은 @L3G4CY-TEAM/admins 에게 태그해 주세요." \
          2>/dev/null || echo "::warning::PR 코멘트 작성 실패 (권한 확인 필요)"
